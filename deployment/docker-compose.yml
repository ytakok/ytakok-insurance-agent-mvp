version: "3.8"

services:
  insurance-agent-mvp:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: insurance-agent-mvp
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - insurance-network
    labels:
      - "app=insurance-agent-mvp"
      - "environment=production"

networks:
  insurance-network:
    driver: bridge
